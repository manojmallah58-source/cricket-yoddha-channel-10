<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/shaka-player.ui.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/controls.min.css" crossorigin="anonymous">
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
        .video-container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="video" data-shaka-player autoplay muted playsinline></video>
    </div>

    <script>
        async function initPlayer() {
            const video = document.getElementById('video');
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, video.parentElement, video);

            player.configure({
                drm: {
                    clearKeys: {
                        'f52a13486b5aa72569ab1e6b45e7ec29': '41611477a72a4b932513c0b824ccae06'
                    }
                }
            });

            try {
                await player.load('https://otte.live.fly.ww.aiv-cdn.net/iad-nitro/live/clients/dash/enc/orxueyvu1q/out/v1/4f512a0c1bf2470c875bf8b26b563c80/cenc.mpd');
                console.log("Stream Loaded Successfully");
            } catch (e) {
                console.error("Error loading stream:", e);
            }
        }

        document.addEventListener('shaka-ui-loaded', initPlayer);
    </script>
</body>
</html>
